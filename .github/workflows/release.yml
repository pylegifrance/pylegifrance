name: Release

on:
  push:
    branches: [main]
    tags: ["v*", "pylegifrance-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v1.6.0). Required when dispatched manually."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Create or update release PR
        run: |
          npx release-please@latest release-pr \
            --token=${{ secrets.GITHUB_TOKEN }} \
            --repo-url=${{ github.repository }} \
            --config-file=.github/release-please-config.json \
            --manifest-file=.github/release-please-manifest.json

      - name: Tag and create GitHub release
        run: |
          npx release-please@latest github-release \
            --token=${{ secrets.GITHUB_TOKEN }} \
            --repo-url=${{ github.repository }} \
            --config-file=.github/release-please-config.json \
            --manifest-file=.github/release-please-manifest.json

  publish:
    if: >-
      startsWith(github.ref, 'refs/tags/v')
      || startsWith(github.ref, 'refs/tags/pylegifrance-v')
      || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    container:
      image: python:3.12
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Common Environment
        uses: ./.github/actions/setup
        with:
          create-env-file: "false"

      - name: Check tag vs pyproject version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          TAG_REF="${INPUT_TAG:-$GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_REF#pylegifrance-v}"
          TAG_VERSION="${TAG_VERSION#v}"
          PROJECT_VERSION=$(awk -F\" '/^version =/ {print $2}' pyproject.toml)
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build pylegifrance
        run: uv build

      - name: Publish pylegifrance to PyPI
        run: uv publish
