name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
      sha: ${{ steps.rp.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: self-hosted
    container:
      image: python:3.12
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.sha }}

      - name: Setup Common Environment
        uses: ./.github/actions/setup
        with:
          create-env-file: "false"

      - name: Build pylegifrance
        run: uv build

      - name: Publish pylegifrance to PyPI
        run: uv publish
