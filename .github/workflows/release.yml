name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
    container:
      image: python:3.12
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6

      - name: Setup Common Environment
        uses: ./.github/actions/setup
        with:
          create-env-file: "false"

      - name: Check tag vs pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION=$(awk -F\" '/^version =/ {print $2}' pyproject.toml)
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pyproject.toml version ($PROJECT_VERSION)"
            exit 1
          fi

      - name: Build pylegifrance
        run: uv build

      - name: Publish pylegifrance to PyPI
        run: uv publish
